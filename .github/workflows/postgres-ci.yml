name: Postgres compatibility

on:
  pull_request:
  push:
    branches:
      - codex-week-picker-fixes
      - main

jobs:
  django-postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: survivor_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      DATABASE_URL: "postgres://postgres:postgres@127.0.0.1:5432/survivor_ci"
      NFL_SEASON_YEAR: "2026"
      NFL_SEASON_START_DATE: "2026-09-09"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "dj-database-url>=3.1.2" \
            "django>=5.2.7" \
            "django-background-tasks>=1.2.8" \
            "django-tables2>=2.7.5" \
            "gunicorn>=23.0.0" \
            "jinja2>=3.1.6" \
            "pandas>=2.3.3" \
            "psycopg2-binary>=2.9.11" \
            "requests>=2.32.5" \
            "sentry-sdk[django]>=2.47.0" \
            "whitenoise>=6.12.0"

      - name: Install browser test dependencies
        run: npm ci

      - name: Install Chrome for Playwright
        run: node node_modules/@playwright/test/cli.js install --with-deps chrome

      - name: Verify migrations render and apply on Postgres
        run: |
          python manage.py makemigrations survivorPool --check --dry-run
          python manage.py migrate --plan
          python manage.py migrate --noinput

      - name: Run Django checks and tests on Postgres
        run: |
          python manage.py check
          python manage.py test survivorPool

      - name: Run Chrome smoke tests on Postgres
        run: node node_modules/@playwright/test/cli.js test
